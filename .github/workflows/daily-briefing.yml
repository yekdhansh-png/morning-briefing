name: Daily Morning Briefing

# 触发：
# - 每交易日北京时间 07:30（UTC 周日-周四 23:30）自动跑
# - 手动触发（workflow_dispatch）
# - 推送到 main 也会重建一次（便于初次部署）
on:
  schedule:
    - cron: '30 23 * * 0-4'
  workflow_dispatch:
  push:
    branches: [main]

# GitHub Pages 部署所需权限
permissions:
  contents: write   # 用于把更新后的 briefing.json commit 回仓库
  pages: write
  id-token: write

# 同一时间只跑一个部署，新触发会取消旧的
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Generate today's briefing
        # 生成器：拉外盘行情（需要 npx）+ 抓 3 路新闻 + 调 DeepSeek 选 TOP3 写解读
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SNP_MCP_TOKEN: ${{ secrets.SNP_MCP_TOKEN }}
        run: python scripts/generate_briefing.py

      - name: Commit updated briefing.json + news archive
        # 仅在 schedule/手动触发时回写仓库，避免普通 push 时反复 commit
        if: github.event_name != 'push'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(briefing): daily update"
          file_pattern: public/briefing.json data/news-archive/*.json

      - name: Install deps
        run: npm ci

      - name: Build
        env:
          # 部署到 https://<user>.github.io/<repo>/ 时需要带子路径
          VITE_BASE: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
